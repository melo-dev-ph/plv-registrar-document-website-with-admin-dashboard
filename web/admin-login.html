<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Admin Login | PLV Registrar</title>
        <link rel="stylesheet" href="css/admin-login.css">
        <link rel="stylesheet" href="css/normalize.css">
    </head>

    <body>
        <div class="vector-bg">
            <div class="wave light-blue-wave"></div>
            <div class="wave white-bottom-wave"></div>
        </div>

        <div class="sign-in">
            <div class="wrapper">
                <div class="plv-photo">
                    <img src="./assets/img/plv-side-login.png" alt="PLV Background">
                </div>

                <div class="admin-content">
                    <h1>PLV ADMIN</h1>
                    <form action="">
                        <fieldset>
                            <legend>Dashboard Login</legend>
                            
                            <div class="forms">
                                <label for="id">Admin ID: </label>
                                <input type="text" name="id" id="id" required>
                            </div>
                            
                            <div class="forms">
                                <label for="password">Password: </label>
                                <input type="password" name="password-input" id="password" required>
                            </div>
                            
                            <div class="form-action">
                                <button type="submit" id="login-btn">LOG IN</button>
                            </div>
                        </fieldset>
                    </form>
                </div>

            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="js/admin-login.js"></script>
    </body>
</html>
